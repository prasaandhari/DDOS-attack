<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>File Decryption</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: linear-gradient(135deg,#e8f5e9,#ffffff);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
header{
background:#1f2937;
color:white;
text-align:center;
padding:18px;
font-size:24px;
font-weight:600;
}

/* NAVBAR */
nav{
background:#22c55e;
display:flex;
justify-content:center;
gap:25px;
padding:12px;
}

nav a{
color:white;
text-decoration:none;
padding:8px 15px;
border-radius:6px;
transition:0.3s;
}

nav a:hover{
background:#15803d;
}

/* CONTAINER */
.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

/* CARD */
.card{
background:white;
padding:35px;
width:350px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
text-align:center;
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.card h2{
color:#22c55e;
margin-bottom:20px;
}

/* INPUT */
.card input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
outline:none;
transition:0.3s;
}

.card input:focus{
border-color:#22c55e;
box-shadow:0 0 5px rgba(34,197,94,0.4);
}

/* BUTTON */
.btn{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-size:15px;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

.btn:hover{
background:#15803d;
}

.reset{
background:#ef4444;
}

.reset:hover{
background:#b91c1c;
}

/* FOOTER */
footer{
background:#1f2937;
color:white;
text-align:center;
padding:12px;
}

</style>

</head>

<body>

<header>
Secure File Storage Dashboard
</header>

<nav>
<a href="/datauserhome">Home</a>
<a href="/datauserfile">Request File</a>
<a href="/datauserviewfile">View File</a>
<a href="/">Logout</a>
</nav>

<div class="container">

<div class="card">

<h2>🔐 File Decryption</h2>

<form method="post" action="/fkey1">

<input type="text" name="filekey" placeholder="Enter File Key" required>

<button type="submit" class="btn">Decrypt File</button>
<button type="reset" class="btn reset">Reset</button>

</form>

</div>

</div>

<footer>
© 2026 Secure Cloud Storage | Green Cybersecurity
</footer>

</body>
</html>
