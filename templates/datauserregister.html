<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>New User Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: linear-gradient(135deg,#e8f5e9,#ffffff);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
header{
background:#1f2937;
color:white;
text-align:center;
padding:20px;
font-size:26px;
font-weight:600;
}

/* NAVBAR */
nav{
background:#22c55e;
display:flex;
justify-content:center;
gap:25px;
padding:12px;
}

nav a{
color:white;
text-decoration:none;
padding:8px 15px;
border-radius:6px;
transition:0.3s;
}

nav a:hover{
background:#15803d;
}

/* CONTAINER */
.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

/* CARD */
.card{
background:white;
padding:35px;
width:420px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.card h2{
text-align:center;
color:#22c55e;
margin-bottom:20px;
}

/* INPUT GROUP */
.input-group{
margin-bottom:15px;
}

.input-group label{
font-size:14px;
font-weight:500;
}

.input-group input,
.input-group textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
outline:none;
}

.input-group input:focus,
.input-group textarea:focus{
border-color:#22c55e;
box-shadow:0 0 5px rgba(34,197,94,0.4);
}

/* RADIO */
.gender{
display:flex;
gap:15px;
margin-top:5px;
}

/* BUTTONS */
.btn{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-size:15px;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

.btn:hover{
background:#15803d;
}

.reset{
background:#ef4444;
}

.reset:hover{
background:#b91c1c;
}

/* FOOTER */
footer{
background:#1f2937;
color:white;
text-align:center;
padding:12px;
}

</style>

</head>

<body>

<header>
DDOS Attack
</header>

<nav>
<a href="/">Homepage</a>
<a href="/adminlogin">Server</a>
<a href="/UserLogin">Owner Login</a>
<a href="/Datauser">User Login</a>
</nav>

<div class="container">

<div class="card">

<h2>New User Registration</h2>

<form method="post" action="/rNewDataUser">

<div class="input-group">
<label>Name</label>
<input type="text" name="name" required>
</div>

<div class="input-group">
<label>Gender</label>
<div class="gender">
<label><input type="radio" name="gender" value="male" required> Male</label>
<label><input type="radio" name="gender" value="female"> Female</label>
</div>
</div>

<div class="input-group">
<label>Age</label>
<input type="number" name="age" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="input-group">
<label>Phone</label>
<input type="text" name="phone" required>
</div>

<div class="input-group">
<label>Address</label>
<textarea name="address" rows="3"></textarea>
</div>

<div class="input-group">
<label>Username</label>
<input type="text" name="uname" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit" class="btn">Register</button>
<button type="reset" class="btn reset">Reset</button>

</form>

</div>

</div>

<footer>
© 2026 Secure Cloud Storage | Green Cybersecurity
</footer>

</body>
</html>
