<!DOCTYPE html>
<html>
<head>

<title>Secure File Storage - Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6f9;
}

/* HEADER */

header{
background:#1f2937;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:600;
}

/* NAVBAR */

nav{
background:#22c55e;
display:flex;
justify-content:center;
gap:30px;
padding:12px;
}

nav a{
color:white;
text-decoration:none;
font-size:16px;
padding:6px 15px;
border-radius:6px;
}

nav a:hover{
background:#15803d;
}

/* CONTAINER */

.container{
width:90%;
margin:auto;
margin-top:40px;
}

/* BANNER */

.banner{
width:100%;
height:300px;
object-fit:cover;
border-radius:10px;
margin-bottom:20px;
}

/* CARD */

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#22c55e;
color:white;
padding:12px;
text-align:center;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

tr:hover{
background:#f1f5f9;
}

/* FOOTER */

footer{
margin-top:40px;
background:#1f2937;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<header>
DDOS Attack - Admin Panel
</header>

<nav>

<a href="/AdminHome">Home</a>
<a href="/userfile">Owner File</a>

<a href="/viewattack">View Attacker</a>
<a href="/">Logout</a>

</nav>

<div class="container">

<img src="static/images/1.jpg" class="banner">

<div class="card">

<h2>User Details</h2>

<table>

<tr>
<th>Sl.No</th>
<th>Name</th>
<th>Gender</th>
<th>Age</th>
<th>Email</th>
<th>Phone</th>
<th>Address</th>
</tr>

{% for item in data %}

<tr>
<td>{{item[0]}}</td>
<td>{{item[1]}}</td>
<td>{{item[2]}}</td>
<td>{{item[3]}}</td>
<td>{{item[4]}}</td>
<td>{{item[5]}}</td>
<td>{{item[6]}}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

<footer>

© 2026 Secure Cloud Storage | Green Cybersecurity System

</footer>

</body>
</html>
