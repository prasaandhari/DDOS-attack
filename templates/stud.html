<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Secure File Storage - Owner Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6f9;
}

/* HEADER */

header{
background:#1f2937;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:600;
}

/* NAVBAR */

nav{
background:#22c55e;
display:flex;
justify-content:center;
gap:30px;
padding:12px;
}

nav a{
color:white;
text-decoration:none;
font-size:16px;
padding:6px 15px;
border-radius:6px;
}

nav a:hover{
background:#15803d;
}

/* BANNER */

.banner{
width:90%;
margin:auto;
margin-top:30px;
}

.banner img{
width:100%;
height:300px;
border-radius:10px;
object-fit:cover;
}

/* LOGIN CARD */

.login-container{
display:flex;
justify-content:center;
margin-top:40px;
}

.login-box{
background:white;
padding:35px;
width:350px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
color:#22c55e;
}

input[type=text],
input[type=password]{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#22c55e;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#15803d;
}

.reset-btn{
background:#ef4444;
margin-left:10px;
}

.reset-btn:hover{
background:#b91c1c;
}

.register{
margin-top:15px;
font-size:14px;
}

.register a{
color:#22c55e;
text-decoration:none;
font-weight:600;
}

/* FOOTER */

footer{
margin-top:40px;
background:#1f2937;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<header>
DDOS Attack
</header>

<nav>

<a href="/">Homepage</a>
<a href="/adminlogin">Server</a>
<a href="/UserLogin">Owner Login</a>
    <a href="/Datauser">User Login</a>


</nav>

<div class="banner">
<img src="static/images/1.jpg">
</div>

<div class="login-container">

<div class="login-box">

<h2>Owner Login</h2>

<form method="post" action="/userlogin">

<input type="text" name="uname" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>
<button type="reset" class="reset-btn">Cancel</button>

</form>

<div class="register">
<a href="/NewUser">New Owner Registration</a>
</div>

</div>

</div>

<footer>
© 2026 Secure Cloud Storage | Green Cybersecurity
</footer>

</body>
</html>
